name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["type: bug", "needs triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Docker, Node, Python versions
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Do not include secrets or proprietary plant data.
