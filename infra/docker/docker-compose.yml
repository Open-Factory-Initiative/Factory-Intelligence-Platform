services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: factory_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - factory_postgres_data:/var/lib/postgresql/data
      - ../../services/ingestion/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factory_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  factory_postgres_data:

